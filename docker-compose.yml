services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set and non-empty}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set and non-empty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set and non-empty}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./local-env/init/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  wallet-api:
    build: .
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER must be set and non-empty}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set and non-empty}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set and non-empty}?sslmode=disable"
      OTEL_SERVICE_NAME: "spec-star-wallet"
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=local,service.version=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    ports:
      - "${LAMBDA_HOST_PORT:-9000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    volumes:
      - ./local-env/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_HOST_PORT:-16686}:16686"
      - "4317"

  loki:
    image: grafana/loki:3.1.0
    volumes:
      - ./local-env/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100"

  alloy:
    image: grafana/alloy:v1.2.0
    volumes:
      - ./local-env/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./local-env/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      loki:
        condition: service_started

volumes:
  postgres-data:
